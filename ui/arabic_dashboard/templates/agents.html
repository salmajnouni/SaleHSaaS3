{% extends "base.html" %}

{% block title %}الوكلاء المتخصصون{% endblock %}
{% block page_title %}الوكلاء الذكيون المتخصصون{% endblock %}

{% block content %}

<div class="row g-4">
    {% for agent in agents %}
    <div class="col-md-6 col-lg-4">
        <div class="card h-100" style="border: 1px solid rgba(255,255,255,0.15); transition: transform 0.2s;">
            <div class="card-body p-4">
                <div class="d-flex align-items-center mb-3">
                    <span style="font-size: 2.5rem; margin-left: 1rem;">{{ agent.icon }}</span>
                    <div>
                        <h5 class="mb-0">{{ agent.name }}</h5>
                        <span class="badge bg-success">{{ agent.status }}</span>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-warning flex-fill"
                            onclick="runAgent('{{ agent.id|e }}', '{{ agent.name|e }}')">
                        <i class="fas fa-play me-1"></i> تشغيل
                    </button>
                    <button class="btn btn-sm btn-outline-info flex-fill"
                            onclick="viewAgentDetails('{{ agent.id|e }}')">
                        <i class="fas fa-info-circle me-1"></i> تفاصيل
                    </button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}

{% block extra_js %}
<script>
function runAgent(agentId, agentName) {
    fetch(`/api/agents/${agentId}/run`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({})
    })
    .then(r => r.json())
    .then(data => alert(`✅ ${agentName}\n${data.message}\nمعرف المهمة: ${data.task_id}`));
}

function viewAgentDetails(agentId) {
    alert(`📋 تفاصيل الوكيل: ${agentId}\nقريباً سيتم عرض لوحة تفصيلية لكل وكيل.`);
}
</script>
{% endblock %}
