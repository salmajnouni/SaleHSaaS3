<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IntegraAI Dashboard</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #10233e;
      --muted: #637082;
      --accent: #0f766e;
      --border: #dde5ef;
    }
    body { margin: 0; font-family: Tahoma, Segoe UI, sans-serif; background: var(--bg); color: var(--ink); }
    header { background: linear-gradient(120deg, #0f766e, #155e75); color: #fff; padding: 20px; }
    main { max-width: 1100px; margin: 20px auto; padding: 0 14px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
    pre { white-space: pre-wrap; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>IntegraAI - لوحة التحكم</h1>
    <p>إدارة المشاريع والخدمات الذكية للتحقق والتوجيه</p>
  </header>
  <main>
    <div class="grid">
      <section class="card">
        <h3>حالة النظام</h3>
        <button onclick="loadHealth()">تحديث الحالة</button>
        <pre id="health">اضغط تحديث...</pre>
      </section>
      <section class="card">
        <h3>المشاريع</h3>
        <button onclick="loadProjects()">تحميل المشاريع</button>
        <pre id="projects">اضغط تحميل...</pre>
      </section>
      <section class="card">
        <h3>الخدمات المتقدمة</h3>
        <button onclick="loadAdvanced()">فحص الخدمات</button>
        <pre id="advanced">اضغط فحص...</pre>
      </section>
    </div>
  </main>
  <script>
    const api = "http://localhost:8000";

    async function loadHealth() {
      const res = await fetch(`${api}/health`);
      document.getElementById("health").textContent = JSON.stringify(await res.json(), null, 2);
    }

    async function loadProjects() {
      const res = await fetch(`${api}/api/v1/projects`);
      document.getElementById("projects").textContent = JSON.stringify(await res.json(), null, 2);
    }

    async function loadAdvanced() {
      const res = await fetch(`${api}/api/v1/advanced-services/health`);
      document.getElementById("advanced").textContent = JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
