networks:
  salehsaas_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  n8n_data:
  open-terminal-data:
  pipelines_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: salehsaas_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=salehsaas
      - POSTGRES_USER=salehsaas
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salehsaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: salehsaas_chromadb
    restart: unless-stopped
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.20
    ports:
      - "127.0.0.1:8010:8000"

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: salehsaas_pipelines
    restart: unless-stopped
    depends_on:
      - open_webui
    volumes:
      - ./pipelines:/app/pipelines
      - ./saleh_core_data/glossary:/app/backend/data/glossary:ro
    environment:
      - PIPELINES_API_KEY=${PIPELINES_API_KEY}
      - N8N_BASE_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_LOGIN_EMAIL=${N8N_LOGIN_EMAIL:-salmajnouni@gmail.com}
      - N8N_LOGIN_PASSWORD=${N8N_PASSWORD}
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.31
    ports:
      - "127.0.0.1:9099:9099"

  open_webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: salehsaas_webui
    restart: unless-stopped
    depends_on:
      - postgres
      - tika
      - chromadb
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_PIPELINES=True
      - PIPELINES_URLS=http://pipelines:9099
      - PIPELINES_API_KEY=${PIPELINES_API_KEY}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - TIKA_SERVER_URL=http://tika:9998
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./saleh_core_data:/app/backend/data
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.30
    ports:
      - "3000:8080"

  browserless:
    image: browserless/chrome:latest
    container_name: salehsaas_browser
    restart: unless-stopped
    profiles:
      - browserless
    # No active usage found in any pipeline/workflow as of 2026-04-06
    # Activate when a real scraping/screenshot use case is wired: docker compose --profile browserless up
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.70
    ports:
      - "3001:3000"

  tika:
    image: apache/tika:latest
    container_name: salehsaas_tika
    restart: unless-stopped
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.32

  searxng:
    image: searxng/searxng:latest
    container_name: salehsaas_searxng
    restart: unless-stopped
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./config/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.33
    ports:
      - "127.0.0.1:8888:8080"

  n8n:
    image: n8nio/n8n:2.14.2
    container_name: salehsaas_n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=salehsaas
      - DB_POSTGRESDB_USER=salehsaas
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_EDITOR_BASE_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Riyadh
      - TZ=Asia/Riyadh
      - N8N_VARIABLES_WEBUI_API_KEY=${WEBUI_API_KEY}
      - N8N_VARIABLES_COUNCIL_MODEL=qwen2.5:7b
      - N8N_VARIABLES_SALEH_TELEGRAM_CHAT_ID=${SALEH_TELEGRAM_CHAT_ID}
      - N8N_VARIABLES_TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - N8N_BLOCK_SVC_REGISTRATION_EMAIL=true
      - N8N_METRICS=true
      - N8N_LOG_LEVEL=info
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - WEBUI_API_KEY=${WEBUI_API_KEY}
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n;/app/logs;/app/core
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./core:/app/core
      - ./logs:/app/logs
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.40
    ports:
      - "5678:5678"

  task_runners:
    image: n8nio/runners:2.14.2
    container_name: salehsaas_task_runners
    restart: unless-stopped
    depends_on:
      - n8n
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.41

  knowledge_watcher:
    build:
      context: ./file_watcher
    container_name: salehsaas_watcher
    restart: unless-stopped
    depends_on:
      - tika
      - data_pipeline
    environment:
      - TIKA_URL=http://tika:9998/tika
      - PIPELINE_URL=http://data_pipeline:8001/process-file/
      - OPEN_WEBUI_URL=http://open_webui:8080
      - WEBUI_API_KEY=${PIPELINES_API_KEY:-salehsaas-pipelines-key-2026}
    volumes:
      - ./knowledge_inbox:/data/incoming
      - ./knowledge_processed:/data/processed
      - ./knowledge_failed:/data/failed
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.61

  data_pipeline:
    build:
      context: ./data_pipeline
    container_name: salehsaas_data_pipeline
    restart: unless-stopped
    depends_on:
      - chromadb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_URL=http://host.docker.internal:11434
      - EMBEDDING_MODEL=qwen3-embedding:0.6b
      - COLLECTION_NAME=saleh_knowledge_qwen3
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.62
    ports:
      - "127.0.0.1:8001:8001"

  open-terminal:
    image: ghcr.io/open-webui/open-terminal
    container_name: salehsaas_open-terminal
    restart: unless-stopped
    profiles:
      - open-terminal
    environment:
      - OPEN_TERMINAL_API_KEY=${OPEN_TERMINAL_API_KEY}
    volumes:
      - open-terminal-data:/home/user
      - C:/saleh26/salehsaas/SaleHSaaS3/saleh:/home/user/projects
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.80
    ports:
      - "8000:8000"

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: salehsaas_crawl4ai
    restart: unless-stopped
    profiles:
      - crawl4ai
    # Zero usage in entire codebase as of 2026-04-06 — disabled until a real use case exists
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.90
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN}

  # python_agent: DEPRECATED 2026-04-10
  # Build context ./python_agent no longer exists. Service had no defined purpose.
  # docker.sock was removed for security. Kept as reference only.
  # If reactivated: create ./python_agent/ with Dockerfile first.
  python_agent:
    build:
      context: ./python_agent
    container_name: salehsaas_python_agent
    restart: unless-stopped
    profiles:
      - disabled
    # SECURITY: docker.sock removed — was granting full Docker control with no real purpose
    # Activate only when a real use case is defined: docker compose --profile python-agent up
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      salehsaas_net:
        ipv4_address: 172.20.0.95
