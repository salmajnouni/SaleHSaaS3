services:
  dev_studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saleh_dev_studio
    restart: unless-stopped
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - TZ=Asia/Riyadh
    volumes:
      - ../:/home/coder/SaleHSaaS3
    ports:
      - "${CODE_SERVER_PORT:-8080}:8080"
    networks:
      - salehsaas_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
networks:
  salehsaas_net:
    external: true
    name: salehsaas3_salehsaas_net
