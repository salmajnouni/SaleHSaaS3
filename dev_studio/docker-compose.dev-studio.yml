networks:
  salehsaas_net:
    external: true
    name: salehsaas3_salehsaas_net

# ── Volumes دائمة لحفظ الحزم بعد إيقاف الحاوية ──────────────────
volumes:
  pip_packages:
    driver: local
  vscode_extensions:
    driver: local

services:
  saleh-code-server:
    image: codercom/code-server:latest
    container_name: saleh-code-server
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      - PASSWORD=saleh_dev_2026
      - CS_DISABLE_GETTING_STARTED_OVERRIDE=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

    volumes:
      # ── ملفات المشروع ──
      - ./workspace:/home/coder/workspace
      - ../:/home/coder/SaleHSaaS

      # ── إعدادات VS Code ──
      - ./config/vscode-settings.json:/home/coder/.local/share/code-server/User/settings.json
      - ./config/continue-config.json:/home/coder/.continue/config.json

      # ── Volumes دائمة للحزم ──
      - pip_packages:/home/coder/.local/lib
      - vscode_extensions:/home/coder/.local/share/code-server/extensions

    networks:
      - salehsaas_net

    extra_hosts:
      - "host.docker.internal:host-gateway"

    user: root

    entrypoint: >
      sh -c "
        echo '🚀 SaleH Dev Studio - جاري التهيئة...' &&

        # تثبيت Python وpip (مطلوب في صورة code-server)
        if ! command -v pip3 > /dev/null 2>&1; then
          echo '⚙️  تثبيت Python وpip...' &&
          apt-get update -qq &&
          apt-get install -y -qq python3 python3-pip python3-venv python3-setuptools &&
          echo '✅ Python جاهز'
        fi &&

        # تثبيت حزم Python إذا لم تكن مثبتة
        if ! python3 -c 'import fastapi' 2>/dev/null; then
          echo '📦 تثبيت حزم Python (RAG + AI) - مرة واحدة فقط...' &&
          python3 -m pip install --quiet --break-system-packages \
            chromadb \
            langchain \
            langchain-community \
            langchain-ollama \
            langchain-chroma \
            sentence-transformers \
            fastapi \
            uvicorn \
            httpx \
            requests \
            pydantic \
            python-dotenv \
            python-multipart \
            pypdf \
            python-docx \
            openpyxl \
            sqlalchemy \
            redis \
            pandas \
            numpy \
            rich &&
          echo '✅ حزم Python جاهزة'
        else
          echo '✅ حزم Python موجودة مسبقاً - تخطي التثبيت'
        fi &&

        # تثبيت امتدادات VS Code
        if ! code-server --list-extensions 2>/dev/null | grep -q 'ms-python'; then
          echo '🔌 تثبيت امتدادات VS Code...' &&
          su coder -c 'code-server --install-extension ms-python.python --force 2>/dev/null || true' &&
          su coder -c 'code-server --install-extension eamodio.gitlens --force 2>/dev/null || true' &&
          su coder -c 'code-server --install-extension esbenp.prettier-vscode --force 2>/dev/null || true' &&
          su coder -c 'code-server --install-extension ms-azuretools.vscode-docker --force 2>/dev/null || true' &&
          echo '✅ الامتدادات جاهزة'
        else
          echo '✅ الامتدادات موجودة مسبقاً'
        fi &&

        echo '🎉 SaleH Dev Studio جاهز! افتح: http://localhost:8080' &&
        exec su coder -c 'dumb-init code-server --bind-addr 0.0.0.0:8080 /home/coder/SaleHSaaS'
      "

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
