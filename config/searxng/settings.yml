use_default_settings:
  engines:
    remove:
      - radio browser
      - ahmia
      - torch

general:
  instance_name: "SaleH SaaS Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ar"
  languages:
    - ar
    - en
  formats:
    - html
    - json

server:
  secret_key: "${SEARXNG_SECRET}"
  limiter: false
  image_proxy: true
  http_protocol_version: "1.1"

ui:
  static_use_hash: true
  default_locale: "ar"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: dark

engines:
  # --- Primary engines (tested & working) ---
  - name: bing
    engine: bing
    shortcut: b
    timeout: 15.0
  - name: mojeek
    engine: mojeek
    shortcut: mj
    timeout: 15.0
  - name: startpage
    engine: startpage
    shortcut: sp
    timeout: 15.0
  - name: brave
    engine: brave
    shortcut: br
    timeout: 15.0
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    timeout: 15.0
  - name: google
    engine: google
    shortcut: g
    timeout: 15.0
  - name: yep
    engine: yep
    shortcut: yp
    timeout: 15.0
  # --- Knowledge sources ---
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    timeout: 10.0
  - name: wikidata
    engine: wikidata
    shortcut: wd
    timeout: 10.0
  # --- IT / Tech ---
  - name: github
    engine: github
    shortcut: gh
    categories: it
    timeout: 10.0

outgoing:
  request_timeout: 15.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
