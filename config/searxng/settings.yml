use_default_settings:
  engines:
    remove:
      - radio browser
      - ahmia
      - torch

general:
  instance_name: "SaleH SaaS Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ar"
  languages:
    - ar
    - en
  formats:
    - html
    - json

server:
  secret_key: "${SEARXNG_SECRET}"
  limiter: false
  image_proxy: true
  http_protocol_version: "1.1"

ui:
  static_use_hash: true
  default_locale: "ar"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: dark

engines:
  - name: google
    engine: google
    shortcut: g
    timeout: 10.0
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    timeout: 10.0
  - name: bing
    engine: bing
    shortcut: b
    timeout: 10.0
  - name: brave
    engine: brave
    shortcut: br
    timeout: 10.0
  - name: wikipedia
    engine: wikidata
    shortcut: w
    timeout: 10.0

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  useragent_suffix: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
  pool_connections: 100
  pool_maxsize: 20
