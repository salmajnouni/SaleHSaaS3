global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Docker containers metrics via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'

  # SaleHSaaS Dashboard
  - job_name: 'salehsaas_dashboard'
    static_configs:
      - targets: ['dashboard:5000']
    metrics_path: '/metrics'

  # Ollama LLM
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: '/metrics'
